server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skytrack}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

  openweather:
    api-key: ${OPENWEATHER_API_KEY:}
    url: ${OPENWEATHER_BASE_URL:https://api.openweathermap.org/data/2.5}/weather

  aviationstack:
    api-key: ${AVIATIONSTACK_API_KEY:}
    url: ${AVIATIONSTACK_BASE_URL:https://api.aviationstack.com/v1}

  opensky:
    base-url: https://opensky-network.org/api
    token-url: https://auth.opensky-network.org/auth/realms/opensky-network/protocol/openid-connect/token
    client-id: ${OPENSKY_CLIENT_ID:}
    client-secret: ${OPENSKY_CLIENT_SECRET:}
    cache-refresh-seconds: ${OPENSKY_CACHE_REFRESH_SECONDS:90}
    anonymous-cache-refresh-seconds: ${OPENSKY_ANONYMOUS_CACHE_REFRESH_SECONDS:660}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}

  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-before-production-123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  upload:
    dir: ${UPLOAD_DIR:uploads/logos/}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080}